version: '3.8'

services:
  app:
    build: .
    container_name: xh-prase
    ports:
      - "1234:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - APP_VERSION=${APP_VERSION:-dev}
      - COMMIT_ID=${COMMIT_ID:-unknown}
      - BUILD_TIME=${BUILD_TIME:-}
    volumes:
      - ./uploads:/app/uploads
      - ./saved_html:/app/saved_html
    restart: unless-stopped
